spring.application.name=application1

# 1. URL de Conexão (Altere 'nome_do_seu_banco' para o nome do banco que você criou no Postgres)
spring.datasource.url=jdbc:postgresql://localhost:5432/lyricsflow

# 2. Credenciais do seu PostgreSQL
spring.datasource.username=postgres
spring.datasource.password=1234

# 3. Configurações do Hibernate / JPA
# O 'update' faz o Hibernate criar ou atualizar as tabelas automaticamente com base nas suas classes @Entity (como a User.java)
spring.jpa.hibernate.ddl-auto=update

# Mostra no console os comandos SQL que o Spring está executando (ótimo para testar)
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Garante que o Hibernate use a sintaxe correta do PostgreSQL
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect